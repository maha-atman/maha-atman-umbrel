version: '3.7'
services:
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      # Hermes home — shares state with the Umbrel Hermes app
      - /home/umbrel/umbrel/app-data/hermes-agent/data/hermes:/home/hermeswebui/.hermes
      # Workspace directory
      - /home/umbrel/umbrel/app-data/hermes-agent/data/hermes/home/workspace:/workspace
    environment:
      - HERMES_HOME=/home/hermeswebui/.hermes
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - WANTED_UID=1000
      - WANTED_GID=1000
      - HERMES_SKIP_CHMOD=1
      # Gateway-backed chat — no agent source needed
      - HERMES_WEBUI_CHAT_BACKEND=gateway
      - HERMES_WEBUI_GATEWAY_BASE_URL=http://host.docker.internal:8642
      - HERMES_WEBUI_GATEWAY_API_KEY=hermes-webui-secret-key
      - HERMES_WEBUI_GATEWAY_USE_RUNS_API=true