category: AI
name: Hermes WebUI
version: "0.51.366"
tagline: Web interface for Hermes AI Agent
description: >-
  Hermes WebUI is a lightweight, dark-themed web interface for Hermes Agent —
  an autonomous AI assistant that retains context across sessions, runs scheduled
  jobs, and connects to 10+ messaging platforms. Features include streaming chat
  with multi-provider model support, session management, workspace file browser,
  voice input, profile switching, cron job management, skills and memory panels,
  and Mermaid diagram rendering.
