version: "3.8"

services:
  app_proxy:
    environment:
      APP_HOST: maha-atman-umbrel-firecrawl-ui_app_1
      APP_PORT: "8080"

  app:
    image: obeoneorg/firecrawl-ui:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
