version: "3.8"

services:
  app_proxy:
    environment:
      APP_HOST: maha-atman-umbrel-firecrawl_api_1
      APP_PORT: "3002"

  api:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    user: "1000:1000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"
      INTERNAL_PORT: "3002"
      EXTRACT_WORKER_PORT: "3004"
      WORKER_PORT: "3005"
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
      POSTGRES_USER: ${POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firecrawl}
      POSTGRES_DB: ${POSTGRES_DB:-firecrawl}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      USE_DB_AUTHENTICATION: "false"
      NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-4}
      CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-5}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
      BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-3}
      ENV: production
      LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      HARNESS_STARTUP_TIMEOUT_MS: "60000"
      # Optional: Set these for LLM features
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-}
      MODEL_EMBEDDING_NAME: ${MODEL_EMBEDDING_NAME:-}
      # Optional: Webhooks
      SELF_HOSTED_WEBHOOK_URL: ${SELF_HOSTED_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Optional: Proxy support
      PROXY_SERVER: ${PROXY_SERVER:-}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
    depends_on:
      - redis
      - postgres
      - rabbitmq
      - playwright-service
    volumes:
      - ${APP_DATA_DIR}/data/firecrawl:/app/data
      - ${APP_DATA_DIR}/data/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-5}
      PROXY_SERVER: ${PROXY_SERVER:-}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      ALLOW_LOCAL_WEBHOOKS: "false"
      BLOCK_MEDIA: "false"
    volumes:
      - ${APP_DATA_DIR}/data/playwright-cache:/tmp/.cache
    tmpfs:
      - /tmp
    cpus: 1.5
    mem_limit: 2G
    memswap_limit: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0 --appendonly yes
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firecrawl}
      POSTGRES_DB: ${POSTGRES_DB:-firecrawl}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firecrawl}"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ${APP_DATA_DIR}/data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    driver: bridge
