version: "3.7"

services:
  api:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: firecrawl-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"
      INTERNAL_PORT: "3002"
      EXTRACT_WORKER_PORT: "3004"
      WORKER_PORT: "3005"
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST: firecrawl-nuq-postgres
      POSTGRES_PORT: "5432"
      USE_DB_AUTHENTICATION: "false"
      NUM_WORKERS_PER_QUEUE: "4"
      CRAWL_CONCURRENT_REQUESTS: "5"
      MAX_CONCURRENT_JOBS: "3"
      BROWSER_POOL_SIZE: "3"
      ENV: production
      LOGGING_LEVEL: info
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      HARNESS_STARTUP_TIMEOUT_MS: "60000"
    depends_on:
      firecrawl-redis:
        condition: service_started
      firecrawl-nuq-postgres:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    volumes:
      - ${APP_DATA_DIR}/data/firecrawl:/app/data
      - ${APP_DATA_DIR}/data/uploads:/app/uploads
    command: node dist/src/harness.js --start-docker
    cpus: 4.0
    mem_limit: 8G
    memswap_limit: 8G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: firecrawl-playwright
    restart: unless-stopped
    environment:
      PORT: "3000"
      MAX_CONCURRENT_PAGES: "5"
      ALLOW_LOCAL_WEBHOOKS: "false"
      BLOCK_MEDIA: "false"
    volumes:
      - ${APP_DATA_DIR}/data/playwright-cache:/tmp/.cache
    tmpfs:
      - /tmp
    cpus: 1.5
    mem_limit: 2G
    memswap_limit: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 30s

  firecrawl-redis:
    image: redis:alpine
    container_name: firecrawl-redis
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0

  firecrawl-nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    container_name: firecrawl-nuq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data

  firecrawl-rabbitmq:
    image: rabbitmq:3-management
    container_name: firecrawl-rabbitmq
    restart: unless-stopped
    command: rabbitmq-server
    volumes:
      - ${APP_DATA_DIR}/data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s