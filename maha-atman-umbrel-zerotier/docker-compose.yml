version: "3.8"

services:
  app_proxy:
    environment:
      APP_HOST: maha-atman-umbrel-zerotier_zerotier_1
      APP_PORT: "9993"

  zerotier:
    image: zyclonite/zerotier:1.16.2
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/zerotier-one
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    healthcheck:
      test: ["CMD", "zerotier-cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3